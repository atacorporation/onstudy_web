<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | OnStudy</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Welcome, <span id="user-name">Student</span></h1>
        <button id="logout-btn">Sign Out</button>
    </header>

    <main class="dashboard-container">
        
        <section class="timer-section">
            <h2>New Study Session</h2>
            <input type="text" id="subject-input" placeholder="What subject are you studying? (e.g., Algorithms)">
            
            <div class="timer-display" id="time-display">00:00:00</div>
            
            <div class="timer-controls">
                <button id="start-btn">Start</button>
                <button id="pause-btn">Pause</button>
                <button id="stop-btn">Stop & Save</button>
            </div>
        </section>

        <section class="stats-section">
            <h2>Weekly Statistics</h2>
            <div class="chart-container">
                <canvas id="studyChart"></canvas>
            </div>
        </section>

        <section class="history-section">
            <h2>Recent Sessions</h2>
            <ul id="session-list">
                </ul>
        </section>

    </main>

    <script src="js/api.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
